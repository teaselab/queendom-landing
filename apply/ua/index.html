<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Заявка | Queendom Agency</title>
    <link rel="icon" type="image/jpeg" href="../../assets/queendom-logo.jpg" />
    <link rel="apple-touch-icon" href="../../assets/queendom-logo.png" />
    <meta name="description" content="Прихована сторінка заявки Queendom Agency." />
    <style>
      :root {
        --black: #211719;
        --ink: #3b2b2f;
        --rose: #e8d7bd;
        --blush: #efe2cf;
        --cream: #f6eadc;
        --white: #fffaf5;
        --muted: #f4e4dc;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 10% 9%, rgba(238, 222, 196, 0.34), rgba(238, 222, 196, 0.16) 22rem, transparent 52rem),
          radial-gradient(circle at 90% 14%, rgba(246, 234, 220, 0.26), rgba(246, 220, 211, 0.12) 24rem, transparent 56rem),
          radial-gradient(circle at 14% 78%, rgba(238, 222, 196, 0.22), rgba(184, 154, 98, 0.1) 24rem, transparent 58rem),
          radial-gradient(circle at 88% 88%, rgba(216, 194, 158, 0.2), rgba(246, 234, 220, 0.1) 22rem, transparent 56rem),
          #33252a;
        color: var(--white);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      img {
        max-width: 100%;
      }

      .shell {
        width: min(1000px, calc(100% - 32px));
        margin-inline: auto;
      }

      .header {
        padding: calc(18px + env(safe-area-inset-top, 0px)) 0 18px;
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 82px;
        border: 2px solid rgba(255, 250, 245, 0.78);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 250, 245, 0.68), rgba(232, 210, 204, 0.48)),
          rgba(247, 217, 215, 0.28);
        padding: 10px 18px;
        box-shadow:
          0 22px 70px rgba(33, 23, 25, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.84),
          inset 0 -18px 46px rgba(59, 43, 47, 0.08);
        backdrop-filter: blur(30px) saturate(1.28);
        -webkit-backdrop-filter: blur(30px) saturate(1.28);
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .logo img {
        width: 56px;
        height: 56px;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 50%;
        background: #f6eee2;
        box-shadow: 0 12px 34px rgba(59, 43, 47, 0.16);
        object-fit: cover;
      }

      .logo strong,
      .logo span {
        display: block;
        color: var(--ink);
        line-height: 1;
        text-transform: uppercase;
      }

      .logo strong {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.01em;
      }

      .logo span {
        margin-top: 6px;
        color: #6f4650;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.42em;
      }

      .language-switcher {
        display: inline-flex;
        flex: 0 0 auto;
        gap: 6px;
        border: 1px solid rgba(255, 250, 245, 0.72);
        border-radius: 999px;
        background: rgba(255, 246, 238, 0.28);
        padding: 5px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.76),
          0 14px 38px rgba(33, 23, 25, 0.12);
        backdrop-filter: blur(22px) saturate(1.35);
        -webkit-backdrop-filter: blur(22px) saturate(1.35);
      }

      .language-switcher a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 40px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(59, 43, 47, 0.68);
        cursor: pointer;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-decoration: none;
        transition:
          background 0.25s ease,
          color 0.25s ease,
          box-shadow 0.25s ease;
      }

      .language-switcher a.is-active {
        background: rgba(255, 250, 245, 0.86);
        color: var(--black);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.88),
          0 8px 22px rgba(216, 194, 158, 0.18);
      }

      .main {
        display: grid;
        min-height: calc(100svh - 156px);
        place-items: center;
        padding: 42px 0 72px;
      }

      .glass {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.74);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.14)),
          linear-gradient(135deg, rgba(247, 217, 215, 0.26), rgba(246, 234, 220, 0.12));
        box-shadow:
          0 30px 100px rgba(33, 23, 25, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.94),
          inset 0 -1px 0 rgba(255, 255, 255, 0.34),
          inset 0 0 34px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(52px) saturate(1.75) contrast(1.04);
        -webkit-backdrop-filter: blur(52px) saturate(1.75) contrast(1.04);
      }

      .glass::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.62), transparent 24%, transparent 62%, rgba(255, 255, 255, 0.22)),
          radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.62), transparent 22rem);
        opacity: 0.72;
      }

      .form-wrap {
        display: grid;
        max-width: 1000px;
        margin-inline: auto;
        border-radius: 32px;
        grid-template-columns: 0.9fr 1.1fr;
      }

      .form-info {
        padding: 42px;
        background:
          radial-gradient(circle at 20% 20%, rgba(246, 220, 211, 0.26), transparent 28rem),
          radial-gradient(circle at 76% 22%, rgba(238, 222, 196, 0.34), transparent 26rem),
          linear-gradient(145deg, rgba(255, 255, 255, 0.46), rgba(255, 246, 238, 0.2));
      }

      .form-info .small-box {
        margin-top: 48px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.24);
        padding: 22px;
      }

      .eyebrow {
        margin: 0;
        color: #7b4f58;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 14px;
        color: var(--ink);
        font-size: clamp(42px, 7vw, 68px);
        line-height: 0.98;
      }

      .lead,
      .note {
        margin-top: 18px;
        color: var(--ink);
        line-height: 1.65;
      }

      .note {
        color: rgba(59, 43, 47, 0.74);
      }

      .form {
        padding: 42px;
      }

      .fields {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(2, 1fr);
      }

      label span {
        display: block;
        margin-bottom: 9px;
        color: rgba(59, 43, 47, 0.72);
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 56px;
        border: 1px solid rgba(255, 255, 255, 0.66);
        border-radius: 18px;
        outline: 0;
        background: rgba(255, 255, 255, 0.32);
        color: var(--black);
        padding: 0 20px;
        transition:
          border-color 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease;
      }

      input::placeholder {
        color: rgba(58, 43, 45, 0.38);
      }

      input:focus {
        border-color: rgba(216, 194, 158, 0.48);
        background: rgba(255, 255, 255, 0.48);
        box-shadow: 0 0 0 4px rgba(238, 222, 196, 0.16);
      }

      .button {
        position: relative;
        display: inline-flex;
        width: 100%;
        min-height: 58px;
        align-items: center;
        justify-content: center;
        margin-top: 28px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.52), rgba(247, 217, 215, 0.34)),
          rgba(255, 255, 255, 0.24);
        color: var(--black);
        cursor: pointer;
        font-weight: 900;
        box-shadow:
          0 18px 54px rgba(33, 23, 25, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(26px) saturate(1.5);
        -webkit-backdrop-filter: blur(26px) saturate(1.5);
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          opacity 0.25s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow:
          0 24px 72px rgba(216, 194, 158, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.88);
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
      }

      .success {
        display: none;
        margin-top: 24px;
        border: 1px solid rgba(255, 255, 255, 0.66);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.32);
        color: var(--ink);
        padding: 22px;
        text-align: center;
      }

      .success strong {
        display: block;
        font-size: 24px;
      }

      .success p {
        margin-top: 10px;
        color: rgba(59, 43, 47, 0.74);
        line-height: 1.6;
      }

      .footer {
        padding: 0 0 calc(34px + env(safe-area-inset-bottom, 0px));
        text-align: center;
      }

      .footer p {
        color: rgba(255, 250, 245, 0.62);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      @media (max-width: 860px) {
        .main {
          min-height: auto;
          padding: 28px 0 52px;
        }

        .form-wrap {
          grid-template-columns: 1fr;
          max-width: 620px;
        }

        .fields {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 20px, 1000px);
        }

        .header {
          padding: calc(10px + env(safe-area-inset-top, 0px)) 0 10px;
        }

        .header-inner {
          min-height: 66px;
          padding: 8px;
          border-radius: 28px;
        }

        .logo img {
          width: 44px;
          height: 44px;
        }

        .logo strong {
          font-size: 14px;
        }

        .logo span {
          font-size: 10px;
          letter-spacing: 0.3em;
        }

        .language-switcher a {
          min-width: 34px;
          height: 32px;
          font-size: 11px;
        }

        .main {
          padding: 14px 0 34px;
        }

        .form-wrap {
          border-radius: 26px;
        }

        .form-info,
        .form {
          padding: 24px;
        }

        .form-info .small-box {
          margin-top: 22px;
          padding: 18px;
          border-radius: 20px;
        }

        h1 {
          font-size: 38px;
          line-height: 1;
        }

        .lead,
        .note {
          margin-top: 14px;
          font-size: 15px;
          line-height: 1.55;
        }

        input {
          height: 54px;
          border-radius: 16px;
          font-size: 16px;
        }

        .button {
          min-height: 56px;
          margin-top: 22px;
          font-size: 15px;
        }
      }

      @media (max-width: 390px) {
        .shell {
          width: min(100% - 16px, 1000px);
        }

        .logo {
          gap: 8px;
        }

        .logo img {
          width: 40px;
          height: 40px;
        }

        .logo strong {
          font-size: 13px;
        }

        .logo span {
          margin-top: 4px;
          font-size: 9px;
          letter-spacing: 0.24em;
        }

        .language-switcher {
          gap: 4px;
          padding: 4px;
        }

        .language-switcher a {
          min-width: 30px;
          height: 30px;
          font-size: 10px;
        }

        .form-info,
        .form {
          padding: 20px;
        }

        h1 {
          font-size: 34px;
        }
      }

      body {
        background:
          radial-gradient(circle at 50% 7%, rgba(238, 222, 196, 0.18), transparent 17rem),
          radial-gradient(circle at 50% 48%, rgba(121, 96, 67, 0.18), transparent 28rem),
          radial-gradient(circle at 12% 86%, rgba(190, 160, 112, 0.1), transparent 22rem),
          linear-gradient(180deg, #060504 0%, #0b0907 46%, #040302 100%);
      }

      .shell {
        width: min(526px, calc(100% - 32px));
      }

      .header {
        padding: calc(22px + env(safe-area-inset-top, 0px)) 0 16px;
      }

      .header-inner {
        justify-content: flex-end;
        min-height: auto;
        border: 0;
        background: transparent;
        padding: 0;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .logo {
        display: none;
      }

      .language-switcher {
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(8, 7, 10, 0.82);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      .language-switcher a {
        color: rgba(255, 250, 245, 0.46);
      }

      .language-switcher a.is-active {
        border: 1px solid rgba(238, 222, 196, 0.78);
        background: rgba(238, 222, 196, 0.08);
        color: #efe2cf;
        box-shadow:
          0 0 22px rgba(238, 222, 196, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .main {
        min-height: auto;
        padding: 22px 0 74px;
      }

      .glass {
        border-color: rgba(238, 222, 196, 0.2);
        background:
          radial-gradient(circle at 50% 0%, rgba(92, 72, 49, 0.42), transparent 18rem),
          linear-gradient(180deg, rgba(24, 21, 18, 0.96), rgba(11, 10, 8, 0.98));
        box-shadow:
          0 34px 100px rgba(0, 0, 0, 0.56),
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          inset 0 0 44px rgba(238, 222, 196, 0.04);
        backdrop-filter: blur(26px) saturate(1.18);
        -webkit-backdrop-filter: blur(26px) saturate(1.18);
      }

      .glass::before {
        background: radial-gradient(circle at 50% 0%, rgba(238, 222, 196, 0.08), transparent 20rem);
        opacity: 1;
      }

      .form-wrap {
        display: block;
        max-width: 526px;
        border-radius: 28px;
      }

      .form-info {
        padding: 40px 40px 18px;
        background: transparent;
        text-align: center;
      }

      .form-info .small-box {
        display: none;
      }

      .eyebrow {
        color: #d8c3a5;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-shadow: none;
        text-transform: none;
      }

      h1 {
        margin-top: 0;
        color: #fffaf5;
        font-size: clamp(38px, 10vw, 48px);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      .lead {
        max-width: 100%;
        margin-top: 18px;
        color: rgba(255, 250, 245, 0.68);
        font-size: 18px;
        line-height: 1.45;
      }

      .slots-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        border: 1px solid rgba(216, 194, 158, 0.38);
        border-radius: 999px;
        background: rgba(216, 194, 158, 0.09);
        color: #efe2cf;
        padding: 12px 28px;
        font-size: 17px;
        font-weight: 900;
        letter-spacing: 0.05em;
        box-shadow:
          0 0 28px rgba(216, 194, 158, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .form {
        padding: 36px 40px 40px;
      }

      .fields {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px;
      }

      label span {
        display: none;
      }

      input {
        height: 58px;
        border: 0;
        border-bottom: 1px solid rgba(255, 250, 245, 0.14);
        border-radius: 0;
        background: transparent;
        color: #fffaf5;
        padding: 0;
        font-size: 20px;
      }

      input::placeholder {
        color: rgba(255, 250, 245, 0.42);
      }

      input:focus {
        border-color: rgba(238, 222, 196, 0.72);
        background: transparent;
        box-shadow: 0 12px 24px -22px rgba(238, 222, 196, 0.88);
      }

      .form-note,
      .privacy-note {
        margin: 24px 0 0;
        color: #e6d2b3;
        font-size: 15px;
        line-height: 1.5;
        text-align: center;
      }

      .privacy-note {
        margin-top: 24px;
        color: rgba(255, 250, 245, 0.4);
      }

      .button {
        min-height: 64px;
        margin-top: 30px;
        border: 1px solid rgba(255, 238, 187, 0.72);
        background:
          linear-gradient(135deg, #f8e0a5 0%, #c99a43 34%, #fff0bd 50%, #b77a22 78%, #f2cf78 100%);
        background-size: 100% 100%;
        color: #2b1d08;
        font-size: 18px;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.34);
        box-shadow:
          0 18px 52px rgba(218, 163, 63, 0.36),
          0 0 34px rgba(248, 210, 120, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          inset 0 -10px 22px rgba(119, 67, 10, 0.16);
      }

      .button::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          radial-gradient(circle at 18% 36%, rgba(255, 255, 255, 0.95) 0 1px, transparent 2px),
          radial-gradient(circle at 34% 68%, rgba(255, 255, 255, 0.85) 0 1px, transparent 2px),
          radial-gradient(circle at 56% 30%, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
          radial-gradient(circle at 74% 58%, rgba(255, 255, 255, 0.82) 0 1px, transparent 2px),
          radial-gradient(circle at 88% 34%, rgba(255, 255, 255, 0.92) 0 1px, transparent 2px);
        background-size:
          96px 54px,
          118px 62px,
          86px 48px,
          132px 70px,
          104px 58px;
        mix-blend-mode: screen;
        opacity: 0.76;
        pointer-events: none;
        transform: translateX(-30%);
        animation: starDust 3.2s ease-in-out infinite;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow:
          0 22px 68px rgba(218, 163, 63, 0.48),
          0 0 44px rgba(248, 210, 120, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .success {
        border-color: rgba(238, 222, 196, 0.22);
        background: rgba(255, 255, 255, 0.05);
        color: #fffaf5;
      }

      .success p {
        color: rgba(255, 250, 245, 0.6);
      }

      .footer {
        display: none;
      }

      @keyframes starDust {
        0% {
          opacity: 0.3;
          transform: translateX(-34%) translateY(0);
          background-position:
            0 0,
            18px 10px,
            8px 18px,
            22px 4px,
            12px 12px;
        }
        45% {
          opacity: 0.95;
        }
        100% {
          opacity: 0.34;
          transform: translateX(34%) translateY(-1px);
          background-position:
            72px -8px,
            88px 12px,
            64px 2px,
            96px -10px,
            82px 8px;
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 44px, 526px);
        }

        .header {
          padding-top: calc(20px + env(safe-area-inset-top, 0px));
        }

        .header-inner {
          justify-content: flex-end;
          min-height: auto;
          border-radius: 0;
          padding: 0;
        }

        .form-info {
          padding: 38px 32px 14px;
        }

        .form {
          padding: 34px 32px 38px;
        }

        h1 {
          font-size: 42px;
        }
      }

      @media (max-width: 390px) {
        .shell {
          width: min(100% - 30px, 526px);
        }

        .form-info,
        .form {
          padding-left: 24px;
          padding-right: 24px;
        }

        h1 {
          font-size: 38px;
        }

        input {
          font-size: 18px;
        }
      }
    </style>

  <body>
    <header class="header">
      <div class="shell header-inner">
        <div class="language-switcher" aria-label="Вибір мови">
          <a href="/apply/index.html" data-lang="ru">RU</a>
          <a href="/apply/ua/index.html" class="is-active" data-lang="ua">UA</a>
          <a href="/apply/en/index.html" data-lang="en">EN</a>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="shell">
        <div class="glass form-wrap">
          <div class="form-info">
            <h1>Готова?</h1>
            <p class="lead">Заповни форму, і ми зв'яжемося з тобою в Telegram протягом 24 годин</p>
          </div>

          <form class="form" id="application-form">
            <div class="fields">
              <label>
                <span>Номер телефону</span>
                <input id="phone-input" name="number" type="tel" placeholder="Мобільний телефон" autocomplete="tel" required />
              </label>
              <label>
                <span>Telegram</span>
                <input id="telegram-input" name="username" type="text" placeholder="@username в Telegram" autocomplete="username" required />
              </label>
            </div>
            <p class="form-note">Дані використовуються тільки для зв'язку та первинної консультації.</p>
            <button class="button" type="submit" id="submit-button">Залишити заявку</button>
            <p class="privacy-note">Конфіденційно<br />2026 Queendom agency</p>
            <div class="success" id="success-message">
              <strong>Дякуємо</strong>
              <p>Ми отримали заявку і скоро зв'яжемося з тобою в Telegram.</p>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer shell">
      <p>© 2026 Queendom Agency</p>
    </footer>

    <script>
      const applicationForm = document.getElementById("application-form");
      const successMessage = document.getElementById("success-message");
      const telegramInput = document.getElementById("telegram-input");
      const submitButton = document.getElementById("submit-button");
      const submitEndpoint = "/api/lead";

      const normalizeTelegram = (value) => {
        const cleanValue = value.trim().replace(/^@+/, "");
        return cleanValue ? `@${cleanValue}` : "";
      };

      const normalizePhoneNumber = (value) => {
        const trimmedValue = value.trim();
        if (!trimmedValue) return "";

        const digits = trimmedValue.replace(/\D/g, "");
        if (trimmedValue.startsWith("+")) {
          return digits ? `+${digits}` : "";
        }

        return digits;
      };

      telegramInput.addEventListener("input", () => {
        const normalized = normalizeTelegram(telegramInput.value);
        if (telegramInput.value && telegramInput.value !== normalized) {
          telegramInput.value = normalized;
        }
      });

      telegramInput.addEventListener("blur", () => {
        telegramInput.value = normalizeTelegram(telegramInput.value);
      });

      const detectBrowser = () => {
        const userAgent = navigator.userAgent;
        if (userAgent.includes("Edg/")) return "Microsoft Edge";
        if (userAgent.includes("OPR/") || userAgent.includes("Opera")) return "Opera";
        if (userAgent.includes("Chrome/") && !userAgent.includes("Edg/")) return "Chrome";
        if (userAgent.includes("Safari/") && !userAgent.includes("Chrome/")) return "Safari";
        if (userAgent.includes("Firefox/")) return "Firefox";
        return userAgent || "unknown";
      };

      const detectDeviceType = () => {
        const userAgent = navigator.userAgent.toLowerCase();
        const touchPoints = navigator.maxTouchPoints || 0;

        if (/ipad|tablet/.test(userAgent)) return "tablet";
        if (/mobi|android|iphone|ipod/.test(userAgent)) return "mobile";
        if (touchPoints > 1 && window.innerWidth < 1024) return "tablet";
        return "desktop";
      };

      const getClientMetadata = async () => {
        const metadata = {
          device: detectDeviceType(),
          browser: detectBrowser(),
          countryip: "unknown",
        };

        try {
          const controller = new AbortController();
          const timeout = window.setTimeout(() => controller.abort(), 2500);
          const response = await fetch("https://ipapi.co/json/", {
            cache: "no-store",
            signal: controller.signal,
          });
          window.clearTimeout(timeout);

          if (response.ok) {
            const data = await response.json();
            metadata.countryip = data.country_name || data.country || data.country_code || "unknown";
          }
        } catch (error) {
          console.warn("IP service unavailable", error);
        }

        return metadata;
      };
      const getTrackingParams = () => {
        const params = new URLSearchParams(window.location.search);
        const readParam = (...names) =>
          names.map((name) => params.get(name)).find((value) => value && value.trim()) || "";

        return {
          campaign: readParam("utm_campaign", "campaign"),
          adset: readParam("utm_adset", "adset"),
          creative: readParam("utm_creative", "utm_content", "creative"),
          placement: readParam("utm_placement", "placement"),
          landing: window.location.href,
        };
      };

      applicationForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        submitButton.disabled = true;
        submitButton.textContent = "Надсилаємо...";

        try {
          const formData = new FormData(applicationForm);
          const username = normalizeTelegram(formData.get("username") || "");
          const number = normalizePhoneNumber(formData.get("number") || "");
          let clientMetadata = {
            device: "unknown",
            browser: navigator.userAgent || "unknown",
            countryip: "unknown",
          };

          try {
            clientMetadata = await getClientMetadata();
          } catch (error) {
            console.warn("Client metadata unavailable", error);
          }

          const createdAt = new Date().toLocaleString();
          const trackingParams = getTrackingParams();
          const payload = {
            date: createdAt,
            created_at: createdAt,
            username,
            number,
            telegram: username,
            phone: number,
            device: clientMetadata.device,
            browser: clientMetadata.browser,
            countryip: clientMetadata.countryip,
            campaign: trackingParams.campaign,
            adset: trackingParams.adset,
            creative: trackingParams.creative,
            placement: trackingParams.placement,
            landing: trackingParams.landing,
          };

          const response = await fetch(submitEndpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error("Lead request failed");
          }

          applicationForm.reset();
          successMessage.style.display = "block";
          if (typeof fbq === "function") {
            fbq('track', 'Lead');
          }
        } catch (error) {
          alert("Не вдалося надіслати заявку. Спробуй ще раз.");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Залишити заявку";
        }
      });
    </script>
  </body>
</html>
